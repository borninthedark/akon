apiVersion: akon/v1alpha1
kind: KernelProfile

metadata:
  name: mainline
  description: >
    Mainline kernel from kernel.org via Fedora kernel-vanilla COPR.
    Tracks Linus's mainline tree — the latest RC or stable point release
    from the current development cycle.

spec:
  source: copr
  copr: "@kernel-vanilla/mainline"
  packages:
    - kernel
    - kernel-core
    - kernel-modules
    - kernel-modules-core
    - kernel-modules-extra
  devel_packages:
    - kernel-devel
    - kernel-headers
  replaces:
    - kernel
    - kernel-core
    - kernel-modules
    - kernel-modules-core
    - kernel-modules-extra
    - kernel-devel
    - kernel-headers
