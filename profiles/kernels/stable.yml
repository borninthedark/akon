apiVersion: akon/v1alpha1
kind: KernelProfile

metadata:
  name: stable
  description: >
    Latest stable kernel from kernel.org via Fedora kernel-vanilla COPR.
    Point releases from the most recent mainline — bug fixes and security
    patches only, no new features.

spec:
  source: copr
  copr: "@kernel-vanilla/stable"
  packages:
    - kernel
    - kernel-core
    - kernel-modules
    - kernel-modules-core
    - kernel-modules-extra
  devel_packages:
    - kernel-devel
    - kernel-headers
  replaces:
    - kernel
    - kernel-core
    - kernel-modules
    - kernel-modules-core
    - kernel-modules-extra
    - kernel-devel
    - kernel-headers
